description:
  it:
    localisedName: GTE-Abruzzo
    shortDescription: Gestionale SaaS per il ciclo di vita e il rilascio delle autorizzazioni per i Trasporti Eccezionali.
    longDescription: |
      GTE-Abruzzo è la piattaforma web a riuso sviluppata dalla Provincia di Pescara come ente capofila per gestire in modalità SaaS (Software as a Service) l'intero iter burocratico dei Trasporti Eccezionali sull'intero territorio regionale.
      
      Il software permette ad aziende e agenzie di pratiche auto di autenticarsi, compilare la propria anagrafica mezzi (Garage Virtuale) e tracciare su mappa il percorso richiesto. Grazie all'integrazione di un motore GIS (OSRM) e alle query spaziali, il sistema calcola automaticamente le intersezioni con i confini comunali e provinciali per determinare le competenze.
      
      Gestisce in autonomia l'istruttoria, l'invio delle richieste di Nulla Osta agli enti terzi attraversati (Comuni, ANAS, Autostrade), la generazione dello IUV per il pagamento dell'indennizzo di maggiore usura stradale (tramite PagoPA) e la ripartizione dei fondi tra gli enti. Infine, genera l'autorizzazione in PDF, la protocolla e si interfaccia con i sistemi di Firma Remota PAdES.
    features:
      - Integrazione nativa SPID e CIE
      - Integrazione nativa PagoPA per generazione IUV e ascolto RT
      - Motore WebGIS integrato con OSRM per snap-to-road vettoriale
      - Analisi spaziale per calcolo esatto dei chilometri di pertinenza per singolo Comune/Ente
      - Generazione PDF dinamica via Headless Chrome con QR Code di validazione per le forze dell'ordine
      - Integrazione API per Protocollo Informatico e Firma Digitale Remota
      - Architettura Multi-tenant (SaaS) basata su ruoli per estensione a livello regionale
