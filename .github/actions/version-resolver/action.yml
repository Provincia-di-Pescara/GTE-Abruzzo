name: Version Resolver
description: Extracts version, version_label, and version_type from the Git ref.

outputs:
  version:
    description: "Semantic version string (e.g. v1.0.0 or dev)"
    value: ${{ steps.resolve.outputs.version }}
  version_label:
    description: "Version with short SHA for non-release builds (e.g. v1.0.0 or dev@abc1234)"
    value: ${{ steps.resolve.outputs.version_label }}
  version_type:
    description: "One of: release, tag, dev"
    value: ${{ steps.resolve.outputs.version_type }}

runs:
  using: composite
  steps:
    - name: Resolve version from Git ref
      id: resolve
      shell: bash
      run: |
        REF="${GITHUB_REF}"
        SHA_SHORT="${GITHUB_SHA::7}"

        if [[ "$REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
          # Semver tag: v1.2.3 or v1.2.3-rc.1
          VERSION="${REF#refs/tags/}"
          echo "version=${VERSION}"       >> "$GITHUB_OUTPUT"
          echo "version_label=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_type=release"     >> "$GITHUB_OUTPUT"
        elif [[ "$REF" =~ ^refs/tags/ ]]; then
          # Non-semver tag
          VERSION="${REF#refs/tags/}"
          echo "version=${VERSION}"       >> "$GITHUB_OUTPUT"
          echo "version_label=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_type=tag"         >> "$GITHUB_OUTPUT"
        else
          # Branch or PR
          echo "version=dev"                        >> "$GITHUB_OUTPUT"
          echo "version_label=dev@${SHA_SHORT}"     >> "$GITHUB_OUTPUT"
          echo "version_type=dev"                   >> "$GITHUB_OUTPUT"
        fi
