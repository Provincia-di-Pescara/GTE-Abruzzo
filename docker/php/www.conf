[www]
user  = www-data
group = www-data

; Unix socket — faster than TCP for same-container communication
listen      = /var/run/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; Dynamic process manager
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5
pm.max_requests      = 500

; Pass all env vars from the container to PHP workers
clear_env = no

; Redirect worker stdout/stderr to the main error log
catch_workers_output = yes
php_admin_value[error_log]  = /dev/stderr
php_admin_flag[log_errors]  = on
